name: ProxyHarvester Hourly

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: proxy-harvester
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Harvest
        run: python -m proxytool harvest --out output/raw.jsonl

      - name: Check
        run: python -m proxytool check --in output/raw.jsonl --out output/live.jsonl

      - name: Verify
        run: python -m proxytool verify --in output/live.jsonl --out output/verified.jsonl

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add output/raw.txt output/verified.jsonl

          git commit -m "hourly update" || exit 0

          git pull --rebase origin main
          git push
