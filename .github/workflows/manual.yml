name: ProxyHarvester Hourly

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Harvest
        run: python -m proxytool harvest --out output/raw.jsonl

      - name: Check
        run: python -m proxytool check --in output/raw.jsonl --out output/live.jsonl

      - name: Verify
        run: python -m proxytool verify --in output/live.jsonl --out output/verified.jsonl

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/verified.jsonl
          git commit -m "hourly update" || echo "no changes"
          git push
